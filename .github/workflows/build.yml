name: Release Miko

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renderer-box:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer update bundle
        run: |
          npm run build:renderer
          npm run build:theme
          node scripts/pack-renderer-box.mjs

      - name: Upload renderer box
        uses: actions/upload-artifact@v4
        with:
          name: renderer-box
          retention-days: 3
          path: dist-renderer-artifact/renderer-*.tar.gz
          if-no-files-found: error

  build:
    needs: renderer-box
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download MinGit
        if: runner.os == 'Windows'
        run: node scripts/download-mingit.js

      - name: Smoke-test MinGit
        if: runner.os == 'Windows'
        run: node scripts/smoke-mingit.mjs vendor/mingit

      - name: Build client
        run: npm run build:client

      - name: Prepare seed signing key
        shell: bash
        env:
          MIKO_SIGN_KEY_PEM: ${{ secrets.MIKO_SIGN_KEY }}
        run: |
          test -n "$MIKO_SIGN_KEY_PEM" || { echo "MIKO_SIGN_KEY secret is required"; exit 1; }
          key="$RUNNER_TEMP/miko-release-sign-key.pem"
          printf '%s\n' "$MIKO_SIGN_KEY_PEM" > "$key"
          echo "MIKO_SIGN_KEY=$key" >> "$GITHUB_ENV"

      - name: Download shared renderer box
        uses: actions/download-artifact@v4
        with:
          name: renderer-box
          path: prebuilt-renderer

      - name: Reuse the shared renderer box
        shell: bash
        run: |
          box="$(find prebuilt-renderer -name 'renderer-*.tar.gz' -print -quit)"
          test -n "$box" || { echo "Shared renderer box is missing"; exit 1; }
          if [ "$RUNNER_OS" = "Windows" ]; then
            box="$(pwd -W)/$box"
          else
            box="$(pwd)/$box"
          fi
          echo "MIKO_PREBUILT_RENDERER_BOX=$box" >> "$GITHUB_ENV"

      - name: Build server seed
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            node scripts/build-server.mjs darwin ${{ matrix.arch }}
          elif [ "$RUNNER_OS" = "Windows" ]; then
            node scripts/build-server.mjs win32 ${{ matrix.arch }}
          else
            node scripts/build-server.mjs linux ${{ matrix.arch }}
          fi

      - name: Build Computer Use helper
        if: runner.os == 'macOS'
        run: MIKO_COMPUTER_USE_HELPER_ARCH=${{ matrix.arch }} node scripts/build-computer-use-helper.mjs ${{ matrix.arch }}

      - name: Build Windows sandbox helper
        if: runner.os == 'Windows'
        shell: pwsh
        run: node scripts/build-windows-sandbox-helper.mjs ${{ matrix.arch }}

      - name: Verify macOS seed kit
        if: runner.os == 'macOS'
        run: node scripts/verify-seed-kit.mjs darwin ${{ matrix.arch }}

      - name: Build macOS installers
        if: runner.os == 'macOS'
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SKIP_NOTARIZE: "true"

      - name: Verify Windows seed kit
        if: runner.os == 'Windows'
        run: node scripts/verify-seed-kit.mjs win32 ${{ matrix.arch }}

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify Linux seed kit
        if: runner.os == 'Linux'
        run: node scripts/verify-seed-kit.mjs linux ${{ matrix.arch }}

      - name: Build Linux installers
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage deb --${{ matrix.arch }} --publish never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 3
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist-server-artifact/*/server-*.tar.gz
            dist-server-artifact/*/seed-train-*.json
            dist-server-artifact/*/seed-train-*.json.sig
            dist-renderer-artifact/renderer-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge macOS update metadata
        run: node scripts/merge-latest-mac-yml.cjs artifacts latest-mac.yml

      - name: Validate release digest
        run: node scripts/validate-release-digest.mjs --tag "${{ github.ref_name }}" --file release-digest.v1.json

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --title "Miko ${{ github.ref_name }}" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find artifacts \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name 'server-*.tar.gz' \) -print0 | \
            while IFS= read -r -d '' asset; do
              gh release upload "${{ github.ref_name }}" "$asset" --clobber
            done
          RENDERER_TGZ="$(find artifacts -path '*installer-macos-latest-arm64*/dist-renderer-artifact/renderer-*.tar.gz' -print -quit)"
          test -n "$RENDERER_TGZ" || { echo "Renderer update archive is missing"; exit 1; }
          gh release upload "${{ github.ref_name }}" "$RENDERER_TGZ" --clobber
          WIN_YML="$(find artifacts -name latest.yml -print -quit)"
          test -n "$WIN_YML" && gh release upload "${{ github.ref_name }}" "$WIN_YML" --clobber
          LINUX_YML="$(find artifacts -name latest-linux.yml -print -quit)"
          test -n "$LINUX_YML" && gh release upload "${{ github.ref_name }}" "$LINUX_YML" --clobber
          gh release upload "${{ github.ref_name }}" latest-mac.yml release-digest.v1.json --clobber

      - name: Verify release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets="$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name')"
          MISSING=()
          echo "$assets" | grep -qx 'latest.yml' || MISSING+=("latest.yml")
          echo "$assets" | grep -qx 'latest-mac.yml' || MISSING+=("latest-mac.yml")
          echo "$assets" | grep -qx 'latest-linux.yml' || MISSING+=("latest-linux.yml")
          echo "$assets" | grep -qx 'release-digest.v1.json' || MISSING+=("release-digest.v1.json")
          echo "$assets" | grep -qE '^Miko-.*-macOS-arm64\.dmg$' || MISSING+=("macOS arm64 installer")
          echo "$assets" | grep -qE '^Miko-.*-macOS-arm64\.zip$' || MISSING+=("macOS arm64 update archive")
          echo "$assets" | grep -qE '^Miko-.*-macOS-x64\.dmg$' || MISSING+=("macOS x64 installer")
          echo "$assets" | grep -qE '^Miko-.*-Windows-x64\.exe$' || MISSING+=("Windows installer")
          echo "$assets" | grep -qE '^Miko-.*-Linux-(x64|x86_64)\.AppImage$' || MISSING+=("Linux AppImage")
          echo "$assets" | grep -qE '^Miko-.*-Linux-(x64|amd64)\.deb$' || MISSING+=("Linux deb")
          echo "$assets" | grep -qE '^server-.*-darwin-arm64\.tar\.gz$' || MISSING+=("macOS arm64 server update archive")
          echo "$assets" | grep -qE '^server-.*-darwin-x64\.tar\.gz$' || MISSING+=("macOS x64 server update archive")
          echo "$assets" | grep -qE '^server-.*-win32-x64\.tar\.gz$' || MISSING+=("Windows server update archive")
          echo "$assets" | grep -qE '^server-.*-linux-x64\.tar\.gz$' || MISSING+=("Linux server update archive")
          echo "$assets" | grep -qE '^renderer-.*\.tar\.gz$' || MISSING+=("renderer update archive")
          if [ ${#MISSING[@]} -gt 0 ]; then
            printf 'Missing metadata: %s\\n' "${MISSING[*]}"
            exit 1
          fi

  publish-train:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Prepare train signing key
        shell: bash
        env:
          MIKO_SIGN_KEY_PEM: ${{ secrets.MIKO_SIGN_KEY }}
        run: |
          test -n "$MIKO_SIGN_KEY_PEM" || { echo "MIKO_SIGN_KEY secret is required"; exit 1; }
          key="$RUNNER_TEMP/miko-release-sign-key.pem"
          printf '%s\n' "$MIKO_SIGN_KEY_PEM" > "$key"
          echo "MIKO_SIGN_KEY=$key" >> "$GITHUB_ENV"

      - name: Publish stable and beta update trains
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/publish-train.mjs --tag "${{ github.ref_name }}" --channel stable
          node scripts/publish-train.mjs --tag "${{ github.ref_name }}" --channel beta
